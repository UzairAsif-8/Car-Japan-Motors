# Render Blueprint — set Root Directory to `backend` in the dashboard if deploying from monorepo root.
services:
  - type: web
    name: car-japan-motors-api
    runtime: node
    buildCommand: npm ci
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
